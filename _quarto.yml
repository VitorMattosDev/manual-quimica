project:
  type: book
  output-dir: _book

lang: pt

book:
  title: "Manual de Química"
  subtitle: "Da matéria à química quântica"
  author: "Série Manuais de Ciências"
  date: today
  search: true
  repo-url: https://github.com/SEU-USUARIO/manual-quimica
  repo-actions: [edit, issue]
  page-footer:
    left: "Manual de Química — Série Manuais de Ciências"
    right: "Construído com [Quarto](https://quarto.org)."
  chapters:
    - index.qmd
    - part: "Volume I — Fundamentos da Química"
      chapters:
        - volumes/v1-fundamentos/01-materia.qmd
        - volumes/v1-fundamentos/02-medidas.qmd
        - volumes/v1-fundamentos/03-metodo.qmd
        - volumes/v1-fundamentos/04-misturas.qmd
        - volumes/v1-fundamentos/05-transformacoes.qmd
        - volumes/v1-fundamentos/06-modelos-atomicos.qmd
        - volumes/v1-fundamentos/07-linguagem.qmd
    - part: "Volume II — Estrutura Atômica e Periodicidade"
      chapters:
        - volumes/v2-atomistica/01-modelo-quantico.qmd
        - volumes/v2-atomistica/02-numeros-quanticos.qmd
        - volumes/v2-atomistica/03-config-eletronica.qmd
        - volumes/v2-atomistica/04-tabela-periodica.qmd
        - volumes/v2-atomistica/05-propriedades-periodicas.qmd
        - volumes/v2-atomistica/06-grupos.qmd
    - part: "Volume III — Ligações Químicas e Estrutura Molecular"
      chapters:
        - volumes/v3-ligacoes/01-ionica.qmd
        - volumes/v3-ligacoes/02-covalente.qmd
        - volumes/v3-ligacoes/03-ressonancia.qmd
        - volumes/v3-ligacoes/04-vsepr.qmd
        - volumes/v3-ligacoes/05-polaridade.qmd
        - volumes/v3-ligacoes/06-hibridizacao.qmd
        - volumes/v3-ligacoes/07-intermoleculares.qmd
    - part: "Volume IV — Estequiometria e Reações"
      chapters:
        - volumes/v4-estequiometria/01-mol-massa.qmd
        - volumes/v4-estequiometria/02-formulas.qmd
        - volumes/v4-estequiometria/03-balanceamento.qmd
        - volumes/v4-estequiometria/04-estequiometria.qmd   # capítulo-gabarito
  appendices:
    - constantes.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-title: "Nesta página"
    number-sections: true
    include-in-header:
      # Carrega a extensão mhchem no MathJax para \ce{...} e \pu{...} no site.
      text: |
        <script>
        window.MathJax = {
          loader: { load: ['[tex]/mhchem'] },
          tex: { packages: { '[+]': ['mhchem'] } }
        };
        </script>
  pdf:
    documentclass: scrreport
    papersize: a4
    toc: true
    number-sections: true
    include-in-header:
      # mhchem (\ce, \pu) e siunitx para o PDF.
      text: |
        \usepackage[version=4]{mhchem}
        \usepackage{siunitx}

# Rótulos em português dos ambientes de teorema/definição etc.
crossref:
  custom:
    - kind: float
      key: rxn
      reference-prefix: "Reação"
      caption-prefix: "Reação"
  thm-title: "Teorema"
  lem-title: "Lema"
  cor-title: "Corolário"
  prp-title: "Proposição"
  def-title: "Definição"
  exm-title: "Exemplo"
  exr-title: "Exercício"
  fig-title: "Figura"
  tbl-title: "Tabela"
  eq-prefix: "Eq."
