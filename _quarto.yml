format:
  html:
    theme: cosmo
    toc: true
    toc-title: "Nesta página"
    number-sections: true
    include-in-header:
      # Carrega a extensão mhchem no MathJax para \ce{...} e \pu{...} no site.
      text: |
        <script>
        window.MathJax = {
          loader: { load: ['[tex]/mhchem'] },
          tex: { packages: { '[+]': ['mhchem'] } }
        };
        </script>
  pdf:
    documentclass: scrreport
    papersize: a4
    toc: true
    number-sections: true
    include-in-header:
      # mhchem (\ce, \pu) e siunitx para o PDF.
      text: |
        \usepackage[version=4]{mhchem}
        \usepackage{siunitx}

# Rótulos em português dos ambientes de teorema/definição etc.
crossref:
  custom:
    - kind: float
      key: rxn
      reference-prefix: "Reação"
      caption-prefix: "Reação"
  thm-title: "Teorema"
  lem-title: "Lema"
  cor-title: "Corolário"
  prp-title: "Proposição"
  def-title: "Definição"
  exm-title: "Exemplo"
  exr-title: "Exercício"
  fig-title: "Figura"
  tbl-title: "Tabela"
  eq-prefix: "Eq."
