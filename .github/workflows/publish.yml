name: Publicar livro

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      # O grafo de pré-requisitos (mermaid) em index.qmd precisa de um Chromium
      # headless para ser convertido em imagem no PDF. Sem ele, o render trava no
      # runner Ubuntu (que não tem navegador). Ocorreu nos manuais de Matemática e Física.
      - name: Instalar Chromium headless (mermaid no PDF)
        run: quarto install chrome-headless-shell

      - name: Renderizar e publicar
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
